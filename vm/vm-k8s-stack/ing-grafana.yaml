apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: vms
spec:
  ingressClassName: nginx
  rules:
  - host: grafana.kw-home
    http:
      paths:
      - backend:
          service:
            name: vm-stack-grafana
            port:
              number: 80
        path: /
        pathType: Prefix

