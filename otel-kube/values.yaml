mode: "daemonset"

presets:
  logsCollection:
    enabled: false
  hostMetrics:
    enabled: true
  kubernetesAttributes:
    enabled: true
    extractAllPodLabels: true
    extractAllPodAnnotations: true
  kubeletMetrics:
    enabled: true
  kubernetesEvents:
    enabled: true
  clusterMetrics:
    enabled: true
  annotationDiscovery:
    logs:
      enabled: false
    metrics:
      enabled: true

configMap:
  create: true

config:
  exporters:
    debug: {}
    otlphttp:
      endpoint: http://mimir-grafana-mimir-gateway.monitoring.svc.cluster.local:80/otlp
    otlphttp/logs:
      endpoint: "http://loki-gateway.monitoring.svc.cluster.local/otlp"
      tls:
        insecure: true
    otlphttp/traces:
      endpoint: http://tempo.monitoring:4318
  processors:
    batch: {}
    memory_limiter:
      check_interval: 5s
      limit_percentage: 80
      spike_limit_percentage: 25
  receivers:
    journald:
      directory: /opt/journal
    jaeger:
      protocols:
        grpc:
          endpoint: ${env:MY_POD_IP}:14250
        thrift_http:
          endpoint: ${env:MY_POD_IP}:14268
        thrift_compact:
          endpoint: ${env:MY_POD_IP}:6831
    otlp:
      protocols:
        grpc:
          endpoint: ${env:MY_POD_IP}:4317
        http:
          endpoint: ${env:MY_POD_IP}:4318
    prometheus:
      config:
        scrape_configs:
          - job_name: integrations/node_exporter
            kubernetes_sd_configs:
              - role: pod
            relabel_configs:
              - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
                action: keep
                regex: prometheus-node-exporter.*
              - source_labels: [__meta_kubernetes_pod_node_name]
                target_label: instance
              - source_labels: [__meta_kubernetes_namespace]
                target_label: namespace
            metric_relabel_configs:
              - source_labels: [__name__]
                action: keep
                regex: node_cpu.*|node_exporter_build_info|node_filesystem.*|node_memory.*|node_network_receive_bytes_total|node_network_receive_drop_total|node_network_transmit_bytes_total|node_network_transmit_drop_total|process_cpu_seconds_total|process_resident_memory_bytes
    zipkin:
      endpoint: ${env:MY_POD_IP}:9411
  service:
    telemetry:
      metrics:
        readers:
          - pull:
              exporter:
                prometheus:
                  host: ${env:MY_POD_IP}
                  port: 8888
    extensions:
      - health_check
    pipelines:
      logs:
        exporters:
          - otlphttp/logs
          - debug
        processors:
          - memory_limiter
          - batch
        receivers:
          - journald
      metrics:
        exporters:
          - otlphttp
        processors:
          - memory_limiter
          - batch
        receivers:
          - otlp
          # if internalTelemetryViaOTLP.metrics.enabled = true, prometheus receiver will be removed
          - prometheus
      traces:
        exporters:
          - otlphttp/traces
        processors:
          - memory_limiter
          - batch
        receivers:
          - otlp
          - jaeger
          - zipkin

ingress:
  enabled: true
  ingressClassName: nginx
  hosts:
    - host: otel.node-01
      paths:
        - path: /
          port: 4318
          pathType: Prefix

image:
  repository: "otel-col-journald"
  pullPolicy: IfNotPresent
  tag: "latest"


extraVolumes: 
  - name: journal-volume
    hostPath:
      path: /var/log/journal/
      type: Directory

extraVolumeMounts:
  - name: journal-volume
    mountPath: /opt/journal
    readOnly: true
